<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWG-TV — Watch Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,700;1,8..60,400&family=DM+Sans:wght@300;400;500;700&display=swap');

:root {
  --red: #bb1919;
  --white: #ffffff;
  --black: #000000;
  --grey1: #111111;
  --grey2: #1e1e1e;
  --grey3: #2e2e2e;
  --grey4: #505050;
  --grey5: #888888;
  --font-head: 'Source Serif 4', Georgia, serif;
  --font-ui: 'DM Sans', Helvetica, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--black);
  overflow: hidden;
  font-family: var(--font-ui);
  color: var(--white);
}

/* ── CONNECT SCREEN ── */
#connect-screen {
  position: fixed; inset: 0;
  background: var(--black);
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.iplayer-header {
  background: var(--black);
  padding: 18px 24px;
  border-bottom: 3px solid var(--red);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.bbc-logo {
  display: flex; gap: 2px;
}
.bbc-block {
  width: 28px; height: 28px;
  background: var(--white);
  color: var(--black);
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
}

.header-title {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1.15rem;
}
.header-title span { color: var(--red); }

.header-live {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--grey5);
}
.live-pill {
  background: var(--red);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 2px 7px;
  border-radius: 2px;
  display: none;
}
.live-pill.show { display: block; }

.connect-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.connect-card {
  background: var(--grey1);
  border: 1px solid var(--grey3);
  border-radius: 4px;
  padding: 36px 40px;
  width: 100%;
  max-width: 440px;
  text-align: center;
}

.cc-logo {
  display: flex; gap: 4px; justify-content: center; margin-bottom: 20px;
}
.cc-block {
  width: 36px; height: 36px;
  background: var(--white);
  color: var(--black);
  font-family: var(--font-ui); font-weight: 700; font-size: 19px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
}

.cc-title {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1.5rem;
  margin-bottom: 4px;
}
.cc-title span { color: var(--red); }
.cc-subtitle {
  font-family: var(--font-head);
  font-weight: 300;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--grey5);
  margin-bottom: 28px;
}

.cc-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--grey5);
  text-transform: uppercase;
  text-align: left;
  margin-bottom: 8px;
}

.cc-input {
  width: 100%;
  background: var(--grey2);
  border: 1px solid var(--grey3);
  border-radius: 2px;
  color: var(--white);
  font-family: var(--font-ui);
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 2px;
  padding: 12px 14px;
  text-transform: uppercase;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 12px;
  text-align: center;
}
.cc-input::placeholder { color: var(--grey4); letter-spacing: 1px; font-weight: 300; text-transform: none; }
.cc-input:focus { border-color: var(--grey5); }

.cc-btn {
  width: 100%;
  background: var(--red);
  color: var(--white);
  border: none;
  border-radius: 2px;
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 1px;
  padding: 13px;
  cursor: pointer;
  transition: background 0.15s;
  text-transform: uppercase;
}
.cc-btn:hover { background: #a01515; }
.cc-btn:disabled { background: #444; cursor: not-allowed; }

.cc-error {
  margin-top: 10px;
  font-size: 0.75rem;
  color: #ff6666;
  min-height: 18px;
}

.cc-hint {
  margin-top: 20px;
  font-size: 0.7rem;
  color: var(--grey4);
  line-height: 1.6;
  border-top: 1px solid var(--grey3);
  padding-top: 16px;
}

/* Connecting animation */
#connecting-msg {
  display: none;
  margin-top: 16px;
  font-size: 0.75rem;
  color: var(--grey5);
  align-items: center;
  gap: 8px;
  justify-content: center;
}
#connecting-msg.show { display: flex; }
.spin {
  width: 12px; height: 12px;
  border: 2px solid #333;
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── WATCH SCREEN ── */
#watch-screen {
  position: fixed; inset: 0;
  background: var(--black);
  display: none;
  flex-direction: column;
}
#watch-screen.show { display: flex; }

/* Fullscreen video area */
.video-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  background: #000;
  cursor: none;
}

#live-video {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}

/* HUD — fades in on hover */
.hud {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.video-wrap:hover .hud,
.video-wrap:hover { cursor: default; }
.video-wrap:hover .hud { opacity: 1; pointer-events: all; }

/* Top bar */
.hud-top {
  background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.hud-logo { display: flex; gap: 2px; }
.hud-block {
  width: 22px; height: 22px;
  background: var(--white); color: var(--black);
  font-family: var(--font-ui); font-weight: 700; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 1px;
}

.hud-channel {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
}
.hud-channel span { color: var(--red); }

.hud-live {
  background: var(--red);
  font-size: 0.55rem; font-weight: 700;
  letter-spacing: 2px; padding: 2px 6px;
  border-radius: 1px;
}

.hud-spacer { flex: 1; }

.hud-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--white);
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.15s;
}
.hud-btn:hover { background: rgba(255,255,255,0.2); }

/* Bottom bar */
.hud-bottom {
  margin-top: auto;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  padding: 20px 20px 14px;
  display: flex;
  align-items: flex-end;
  gap: 12px;
}

.hud-bottom-info { flex: 1; }
.hud-prog-title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 2px;
}
.hud-prog-time {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}

.fullscreen-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--white);
  font-size: 1rem;
  width: 36px; height: 36px;
  border-radius: 2px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.fullscreen-btn:hover { background: rgba(255,255,255,0.25); }

/* No signal overlay */
#no-signal {
  position: absolute; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 10;
}
#no-signal.hide { display: none; }
.ns-logo { display: flex; gap: 3px; }
.ns-block {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.3);
  font-family: var(--font-ui); font-weight: 700; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
}
.ns-text {
  font-family: var(--font-head);
  font-weight: 300; font-style: italic;
  font-size: 1rem; color: rgba(255,255,255,0.3);
}
.ns-sub {
  font-size: 0.65rem; color: rgba(255,255,255,0.2);
  letter-spacing: 2px; text-transform: uppercase;
}

/* Bottom channel bar */
.channel-bar {
  background: var(--grey1);
  border-top: 1px solid var(--grey3);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.cb-logo { display: flex; gap: 2px; }
.cb-block {
  width: 20px; height: 20px;
  background: var(--white); color: var(--black);
  font-family: var(--font-ui); font-weight: 700; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 1px;
}
.cb-name {
  font-family: var(--font-head);
  font-size: 0.8rem; font-weight: 700;
}
.cb-name span { color: var(--red); }
.cb-live {
  background: var(--red);
  font-size: 0.55rem; font-weight: 700; letter-spacing: 2px;
  padding: 2px 6px; border-radius: 1px;
}
.cb-spacer { flex: 1; }
.cb-clock {
  font-size: 0.75rem; color: var(--grey5);
  letter-spacing: 1px;
}
.cb-disc-btn {
  background: transparent;
  border: 1px solid var(--grey3);
  color: var(--grey5);
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.cb-disc-btn:hover { border-color: var(--grey5); color: var(--white); }

/* Reconnecting overlay */
#reconnect-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  z-index: 20;
}
#reconnect-overlay.show { display: flex; }
.ro-spin {
  width: 32px; height: 32px;
  border: 3px solid #333;
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.ro-text {
  font-family: var(--font-head);
  font-size: 0.9rem; font-weight: 300; font-style: italic;
  color: var(--grey5);
}

</style>
</head>
<body>

<!-- CONNECT SCREEN -->
<div id="connect-screen">
  <div class="iplayer-header">
    <div class="bbc-logo">
      <div class="bbc-block">S</div>
      <div class="bbc-block">W</div>
      <div class="bbc-block">G</div>
    </div>
    <div class="header-title">SWG<span>-TV</span></div>
    <div class="header-live">
      <div class="live-pill" id="header-live-pill">LIVE</div>
    </div>
  </div>

  <div class="connect-body">
    <div class="connect-card">
      <div class="cc-logo">
        <div class="cc-block">S</div>
        <div class="cc-block">W</div>
        <div class="cc-block">G</div>
      </div>
      <div class="cc-title">SWG<span>-TV</span></div>
      <div class="cc-subtitle">Live Television</div>

      <div class="cc-label">Room ID</div>
      <input class="cc-input" id="room-input" type="text" placeholder="Enter room code" maxlength="36" autocomplete="off" autocorrect="off" spellcheck="false">

      <button class="cc-btn" id="watch-btn" onclick="startWatching()">Watch Live</button>
      <div class="cc-error" id="cc-error"></div>

      <div id="connecting-msg" class="connecting-msg">
        <div class="spin"></div>
        <span>Connecting to SWG-TV…</span>
      </div>

      <div class="cc-hint">
        Get the Room ID from the broadcaster.<br>
        This stream is live — you're watching in real time.
      </div>
    </div>
  </div>
</div>

<!-- WATCH SCREEN -->
<div id="watch-screen">
  <div class="video-wrap" id="video-wrap">

    <video id="live-video" autoplay playsinline></video>

    <!-- No signal -->
    <div id="no-signal">
      <div class="ns-logo">
        <div class="ns-block">S</div>
        <div class="ns-block">W</div>
        <div class="ns-block">G</div>
      </div>
      <div class="ns-text">Waiting for broadcast…</div>
      <div class="ns-sub">SWG-TV</div>
    </div>

    <!-- Reconnecting -->
    <div id="reconnect-overlay">
      <div class="ro-spin"></div>
      <div class="ro-text">Reconnecting…</div>
    </div>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-top">
        <div class="hud-logo">
          <div class="hud-block">S</div>
          <div class="hud-block">W</div>
          <div class="hud-block">G</div>
        </div>
        <div class="hud-channel">SWG<span>-TV</span></div>
        <div class="hud-live">LIVE</div>
        <div class="hud-spacer"></div>
        <button class="hud-btn" onclick="disconnect()">Leave</button>
      </div>

      <div class="hud-bottom">
        <div class="hud-bottom-info">
          <div class="hud-prog-title">SWG-TV Live</div>
          <div class="hud-prog-time" id="hud-time">——</div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
      </div>
    </div>
  </div>

  <div class="channel-bar">
    <div class="cb-logo">
      <div class="cb-block">S</div>
      <div class="cb-block">W</div>
      <div class="cb-block">G</div>
    </div>
    <div class="cb-name">SWG<span>-TV</span></div>
    <div class="cb-live">LIVE</div>
    <div class="cb-spacer"></div>
    <div class="cb-clock" id="cb-clock">00:00:00</div>
    <button class="cb-disc-btn" onclick="disconnect()">Disconnect</button>
  </div>
</div>

<script>
let peer = null;
let currentCall = null;
const liveVideo = document.getElementById('live-video');

// ── CLOCK ──
setInterval(() => {
  const n = new Date();
  const p = v => String(v).padStart(2,'0');
  const t = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('cb-clock').textContent = t;
  document.getElementById('hud-time').textContent = t;
}, 1000);

// ── AUTO-FILL ROOM FROM URL ──
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  if (room) {
    document.getElementById('room-input').value = room;
    // auto-connect
    setTimeout(startWatching, 400);
  }
});

function setError(msg) {
  document.getElementById('cc-error').textContent = msg;
}

function startWatching() {
  const roomId = document.getElementById('room-input').value.trim();
  if (!roomId) { setError('Please enter a room ID.'); return; }

  setError('');
  document.getElementById('watch-btn').disabled = true;
  document.getElementById('connecting-msg').classList.add('show');

  peer = new Peer(undefined, {
    host: '0.peerjs.com',
    port: 443,
    secure: true,
    path: '/',
    debug: 0,
  });

  peer.on('open', myId => {
    const call = peer.call(roomId, createEmptyStream());
    currentCall = call;

    call.on('stream', remoteStream => {
      liveVideo.srcObject = remoteStream;
      liveVideo.play().catch(() => {});
      document.getElementById('no-signal').classList.add('hide');
      document.getElementById('reconnect-overlay').classList.remove('show');

      // Switch to watch screen
      document.getElementById('connect-screen').style.display = 'none';
      document.getElementById('watch-screen').classList.add('show');
    });

    call.on('close', () => {
      document.getElementById('no-signal').classList.remove('hide');
      liveVideo.srcObject = null;
    });

    call.on('error', err => {
      console.error(err);
      document.getElementById('reconnect-overlay').classList.add('show');
    });
  });

  peer.on('error', err => {
    let msg = 'Could not connect. Check the room ID and try again.';
    if (err.type === 'peer-unavailable') msg = 'Room not found. Is the broadcaster live?';
    if (err.type === 'network') msg = 'Network error. Check your connection.';
    setError(msg);
    document.getElementById('watch-btn').disabled = false;
    document.getElementById('connecting-msg').classList.remove('show');
    if (peer) { peer.destroy(); peer = null; }
  });
}

function disconnect() {
  if (currentCall) { currentCall.close(); currentCall = null; }
  if (peer) { peer.destroy(); peer = null; }
  liveVideo.srcObject = null;

  document.getElementById('watch-screen').classList.remove('show');
  document.getElementById('connect-screen').style.display = '';
  document.getElementById('watch-btn').disabled = false;
  document.getElementById('connecting-msg').classList.remove('show');
  document.getElementById('no-signal').classList.remove('hide');
}

function createEmptyStream() {
  // PeerJS needs us to send something to initiate; send a silent/blank stream
  const ctx = new AudioContext();
  const dest = ctx.createMediaStreamDestination();
  const osc = ctx.createOscillator();
  osc.connect(dest);
  osc.start();
  osc.stop(ctx.currentTime + 0.001);
  const canvas = document.createElement('canvas');
  canvas.width = 2; canvas.height = 2;
  const vs = canvas.captureStream(1);
  const combined = new MediaStream([...vs.getVideoTracks(), ...dest.stream.getAudioTracks()]);
  return combined;
}

function toggleFullscreen() {
  const wrap = document.getElementById('video-wrap');
  if (!document.fullscreenElement) {
    wrap.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
</script>
</body>
</html>
